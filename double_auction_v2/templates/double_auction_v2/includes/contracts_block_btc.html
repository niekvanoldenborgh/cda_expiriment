<div class="col-md-4">
    <div class="card my-3">
        <div class="card-body btc_house">
            <h4 class="card-title">Your contracts (BTC)</h4>

            <table class="table table-striped header-fixed tablecol-4 contracts-table">
                <thead>
                    <tr>
                        <th>{% if player.role_str == 'buyer' %}Value{% else %}Cost{% endif %}</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody class="contracts_container_btc">
                    {% include 'double_auction_v2/includes/contracts_to_render_btc.html' %}
                </tbody>
            </table>
        </div>
    </div>
</div>
