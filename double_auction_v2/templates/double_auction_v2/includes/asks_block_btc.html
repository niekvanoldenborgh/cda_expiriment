<div class="col-md-3">
    <div class="card my-3">
        <div class="card-body btc_house">
            <h4 class="card-title">Asks (BTC)</h4>

            <table class="table table-striped header-fixed">
                <thead>
                    <tr>
                        {% if player.btc_tax_active %}
                            <th style="width: 25%">Price</th>
                            <th style="width: 25%">Incl. tax</th>
                            <th style="width: 30%">Quantity</th>
                            <th style="width: 20%">&nbsp;</th>
                        {% else %}
                            <th style="width: 30%">Price</th>
                            <th style="width: 40%">Quantity</th>
                            <th style="width: 30%">&nbsp;</th>
                        {% endif %}
                    </tr>
                </thead>
                <tbody class="asks_container_btc">
                    {% include 'double_auction_v2/includes/asks_to_render_btc.html' %}
                </tbody>
            </table>
        </div>
    </div>
</div>
