{% if player.is_dollar_frozen %}
<div class="alert alert-warning py-2 px-2 mb-2" role="alert">
    <strong>Your Dollar (Currency A) account is frozen this period.</strong>
    You cannot use your dollars to bid or accept offers right now. Your dollar
    balance is kept and will be usable again in a later period. Your Currency B
    (bitcoin) trading is unaffected.
</div>
{% endif %}

<div class="form-row">
    <div class="form-group col-md-6 form-inline">
        <label for="price" class="mr-3">Price:</label>

        <input type="number" class="form-control" id="price" placeholder=""
               {% if no_slots_or_funds_dollar %}readonly{% endif %}
               name="price">
    </div>
    <div class="form-group col-md-6 form-inline">
        <label for="quantity_id" class="mr-3">Quantity:</label>
        <input type="number" class="form-control" id="quantity_id"
               placeholder="1" {% if no_slots_or_funds_dollar %}readonly{% endif %}
               name="quantity" value="1">
    </div>
</div>

<div class="form-row">
    <div class="form-group col-md-12">
        <button type="button"
                class="btn btn-primary btn-block btn-sm"
                id="submit_statement"
                {% if no_slots_or_funds_dollar %}disabled{% endif %}>
            Submit {{ player.action_name }}
        </button>
    </div>
</div>

<div class="form-row">
    <div class="form-group col-md-6">
        <button type="button"
                class="btn btn-primary btn-block btn-sm"
                id="best_statement"
                {% if no_slots_or_funds_dollar %}disabled{% endif %}>
            Accept best {{ player.action_name_reverse }}
        </button>
    </div>

    <div class="form-group col-md-6">
        <button type="button"
                class="btn btn-danger btn-block btn-sm"
                id="retract_statement"
                {% if no_slots_or_funds_dollar %}disabled{% endif %}>
            Retract last {{ player.action_name }}
        </button>
    </div>
</div>
